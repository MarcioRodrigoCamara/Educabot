services:
  - type: web
    name: educabot
    runtime: python

    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: python app.py

    envVars:
      - key: TOKEN
        sync: false

      - key: RENDER_EXTERNAL_URL
        sync: false

      - key: PORT
        value: "10000"